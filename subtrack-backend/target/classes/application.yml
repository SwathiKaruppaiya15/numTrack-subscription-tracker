server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://ep-fragrant-term-ammlvt3o-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: neondb_owner
    password: npg_aHR2PBEov4Gg
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your@gmail.com}
    password: ${MAIL_PASSWORD:yourpassword}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${JWT_EXPIRATION:86400000}

  scheduler:
    enabled: ${SCHEDULER_ENABLED:true}
    timezone: ${SCHEDULER_TIMEZONE:Asia/Kolkata}

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    com.subtrack: DEBUG
    org.springframework.security: WARN
    # Suppress the harmless "constraint does not exist, skipping" warnings
    # that Hibernate emits during ddl-auto:update on every startup
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
