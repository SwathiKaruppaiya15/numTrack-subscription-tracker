<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .header { background: linear-gradient(135deg, #ef4444, #dc2626); padding: 32px 40px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 22px; font-weight: 700; }
    .body { padding: 32px 40px; }
    .body p { color: #475569; font-size: 15px; line-height: 1.6; margin: 0 0 16px; }
    .card { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 20px 24px; margin: 20px 0; }
    .card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
    .card .value { font-size: 22px; font-weight: 700; color: #dc2626; margin-top: 4px; }
    .reason { background: #fff7ed; border-left: 3px solid #f97316; padding: 12px 16px; border-radius: 4px; font-size: 13px; color: #9a3412; }
    .btn { display: block; width: fit-content; margin: 24px auto 0; background: #ef4444; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-weight: 600; font-size: 14px; }
    .footer { background: #f8fafc; padding: 20px 40px; text-align: center; font-size: 12px; color: #94a3b8; border-top: 1px solid #e2e8f0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>❌ Payment Failed</h1></div>
  <div class="body">
    <p>Hi <strong th:text="${userName}">User</strong>,</p>
    <p>We were unable to process your payment for <strong th:text="${subName}">Subscription</strong>.</p>
    <div class="card">
      <div class="label">Failed Amount</div>
      <div class="value" th:text="${amount}">₹499</div>
    </div>
    <div class="reason" th:if="${failureReason}">
      <strong>Reason:</strong> <span th:text="${failureReason}">Insufficient funds</span>
    </div>
    <p style="margin-top:16px;">Please update your payment method to restore your subscription.</p>
    <a th:href="${dashboardUrl}" class="btn">Fix Payment →</a>
  </div>
  <div class="footer">© 2026 SubTrack. All rights reserved.</div>
</div>
</body>
</html>
