version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: subtrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       subtrack
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────
  backend:
    build:
      context: ./subtrack-backend
      dockerfile: Dockerfile
    container_name: subtrack-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL:           jdbc:postgresql://postgres:5432/${POSTGRES_DB:-subtrack}
      DB_USERNAME:      ${POSTGRES_USER:-postgres}
      DB_PASSWORD:      ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET:       ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION:   ${JWT_EXPIRATION:-86400000}
      MAIL_HOST:        ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:        ${MAIL_PORT:-587}
      MAIL_USERNAME:    ${MAIL_USERNAME:-}
      MAIL_PASSWORD:    ${MAIL_PASSWORD:-}
      FRONTEND_URL:     ${FRONTEND_URL:-http://localhost:5173}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./subtrack-frontend
      dockerfile: Dockerfile
    container_name: subtrack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"

volumes:
  postgres_data:
